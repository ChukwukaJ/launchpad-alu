name: launchpad_alu
description: >
  LaunchPad ALU — connects ALU students seeking internship experience with
  student-led startups and early-stage ventures within the ALU ecosystem.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.6
  firebase_messaging: ^14.7.19

  # State management
  flutter_bloc: ^8.1.4   # Cubit lives in this package
  equatable: ^2.0.5

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.7
  timeago: ^3.6.1

  # Utilities
  uuid: ^4.3.3
  connectivity_plus: ^6.1.5
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true